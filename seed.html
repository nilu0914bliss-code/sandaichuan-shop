<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>三代傳 — 商品匯入工具（一次性）</title>
<style>body{font-family:sans-serif;max-width:560px;margin:40px auto;padding:0 16px;line-height:1.8;}
button{padding:12px 26px;font-size:16px;cursor:pointer;} .ok{color:green;} .err{color:#c00;} pre{background:#f6f6f6;padding:10px;font-size:12px;}</style>
</head>
<body>
<h2>三代傳 — 商品匯入工具</h2>
<p>用途：把菜單一次寫入 Firestore 的 <b>products</b>。只需執行一次。<br>
前置：1) firebase-config.js 已填好　2) Firestore 規則暫時換成 firestore.rules.匯入用.txt 的內容（匯入完馬上換回正式版）。</p>
<button id="go">開始匯入（26 個品項）</button>
<div id="log"></div>
<script src="firebase-config.js"></script>
<script type="module">
const MENU = [
 {cat:"招牌土雞", catSort:1, items:[
  {pid:"c1", n:"招牌鹽水土雞", limit:10, vars:[{v:"大雞腿",p:200},{v:"半隻",p:250},{v:"全雞",p:500}]},
  {pid:"c2", n:"甘蔗煙燻土雞", limit:null, vars:[{v:"大雞腿",p:200},{v:"半隻",p:250},{v:"全雞",p:500}]},
  {pid:"c3", n:"仿土雞腿", limit:null, vars:[{v:"煙燻",p:90},{v:"鹽水",p:90}]},
  {pid:"c4", n:"雞絲", limit:null, vars:[{v:"",p:100}]},
 ]},
 {cat:"三代傳首選", catSort:2, items:[
  {pid:"s1", n:"招牌鴨血（米血）", limit:null, vars:[{v:"小",p:30},{v:"大",p:50}]},
  {pid:"s2", n:"豆皮", limit:null, vars:[{v:"小",p:25},{v:"大",p:45}]},
  {pid:"s3", n:"大豆乾", limit:null, vars:[{v:"",p:18}]},
  {pid:"s4", n:"嘴邊肉", limit:null, vars:[{v:"",p:50}]},
  {pid:"s5", n:"豬皮", limit:null, vars:[{v:"",p:30}]},
 ]},
 {cat:"滷味小品", catSort:3, items:[
  {pid:"m1", n:"鴨頭", limit:null, vars:[{v:"單隻",p:20},{v:"三隻",p:50}]},
  {pid:"m2", n:"海帶", limit:null, vars:[{v:"單個",p:15},{v:"3 個",p:40}]},
  {pid:"m3", n:"百頁", limit:null, vars:[{v:"小",p:15},{v:"大",p:25}]},
  {pid:"m4", n:"豬舌", limit:null, vars:[{v:"小",p:60},{v:"大",p:120}]},
  {pid:"m5", n:"滷蛋", limit:null, vars:[{v:"",p:10}]},
  {pid:"m6", n:"黑輪片", limit:null, vars:[{v:"",p:5}]},
  {pid:"m7", n:"小豆乾", limit:null, vars:[{v:"",p:5}]},
  {pid:"m8", n:"雞肝", limit:null, vars:[{v:"",p:5}]},
 ]},
 {cat:"豬部位", catSort:4, items:[
  {pid:"p1", n:"豬耳朵", limit:null, vars:[{v:"",p:50}]},
  {pid:"p2", n:"豬頭皮", limit:null, vars:[{v:"",p:50}]},
  {pid:"p3", n:"豬肚", limit:null, vars:[{v:"",p:40}]},
  {pid:"p4", n:"大腸", limit:null, vars:[{v:"",p:50}]},
  {pid:"p5", n:"大腸頭", limit:null, vars:[{v:"",p:50}]},
 ]},
 {cat:"其他好料", catSort:5, items:[
  {pid:"o1", n:"蛋白", limit:null, vars:[{v:"",p:30}]},
  {pid:"o2", n:"筍絲", limit:null, vars:[{v:"",p:30}]},
  {pid:"o3", n:"鴨腸", limit:null, vars:[{v:"",p:30}]},
  {pid:"o4", n:"粉腸", limit:null, vars:[{v:"魚",p:30},{v:"肉",p:30}]},
 ]},
];
const log = m => document.getElementById("log").innerHTML += "<div>"+m+"</div>";
document.getElementById("go").onclick = async ()=>{
  const cfg = window.FIREBASE_CONFIG || {};
  if(!cfg.apiKey){ log('<span class="err">firebase-config.js 尚未填寫</span>'); return; }
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  const db = getFirestore(initializeApp(cfg));
  let n=0;
  try{
    for(const c of MENU){
      let s=0;
      for(const it of c.items){
        await setDoc(doc(db,"products",it.pid), {
          pid:it.pid, n:it.n, cat:c.cat, catSort:c.catSort, sort:s++,
          vars:it.vars, limit:it.limit, on:true
        });
        n++; log("✔ "+it.n);
      }
    }
    log('<span class="ok">完成！共 '+n+' 個品項。請立刻把 Firestore 規則換回正式版。</span>');
  }catch(e){ log('<span class="err">失敗：'+e.message+'（多半是規則沒開寫入）</span>'); }
};
</script>
</body></html>
