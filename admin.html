<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三代傳 — 店家後台</title>
<style>
  :root{--wine:#6F2222;--wine-deep:#591A1A;--cream:#E9D6A9;--cream-soft:#F6EDD8;--paper:#FBF6EA;
    --ink:#3A2A22;--ink-soft:#7A6353;--line:#E3D5B8;--green:#5A7A48;--blue:#3E6280;--gold:#B07514;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--paper);color:var(--ink);
    max-width:480px;margin:0 auto;min-height:100vh;border-left:1px solid var(--line);border-right:1px solid var(--line);padding-bottom:40px;}
  header{background:var(--wine);color:var(--cream);padding:14px 16px;position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;}
  header .t{font-size:16px;font-weight:700;letter-spacing:3px;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;flex:1;}
  header button{border:1px solid var(--cream);background:none;color:var(--cream);border-radius:3px;font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit;letter-spacing:1px;}
  .mtabs{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:52px;z-index:29;}
  .mtab{flex:1;border:none;background:none;padding:12px 0;font-size:14.5px;letter-spacing:3px;color:var(--ink-soft);cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;}
  .mtab.on{color:var(--wine);font-weight:800;border-bottom-color:var(--wine);}
  .view{display:none;} .view.show{display:block;}
  .btn{border:none;border-radius:3px;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit;letter-spacing:2px;}
  .btn-w{background:var(--wine);color:var(--cream);padding:10px 16px;}
  .btn-full{width:100%;padding:13px;background:var(--wine);color:var(--cream);font-size:15px;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;line-height:1.6;}
  .empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:14px;line-height:2;}

  /* 登入 */
  #login{padding:60px 24px;}
  #login h2{text-align:center;font-size:19px;letter-spacing:6px;font-weight:700;margin-bottom:24px;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;}
  .field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:4px;font-size:15px;background:#fff;font-family:inherit;color:var(--ink);}
  .field input:focus{outline:none;border-color:var(--wine);}
  #login-err{color:#C8351F;font-size:13px;margin-top:10px;text-align:center;font-weight:700;}

  /* 訂單 */
  .stats{display:flex;gap:10px;padding:14px 16px 0;}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px;text-align:center;}
  .stat .num{font-size:22px;font-weight:800;color:var(--wine);}
  .stat .lb{font-size:11.5px;color:var(--ink-soft);letter-spacing:1px;margin-top:2px;}
  .tabs{display:flex;gap:8px;padding:14px 16px 6px;flex-wrap:wrap;}
  .tab{flex:1;border:1px solid var(--wine);color:var(--wine);background:transparent;padding:8px 0;border-radius:3px;font-size:13px;cursor:pointer;letter-spacing:1px;font-family:inherit;min-width:70px;}
  .tab.on{background:var(--wine);color:var(--cream);font-weight:700;}
  .list{padding:8px 16px 20px;}
  .order{background:#fff;border:1px solid var(--line);border-radius:6px;margin-bottom:12px;overflow:hidden;}
  .o-head{padding:12px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;flex-wrap:wrap;}
  .o-head .no{font-size:13.5px;font-weight:800;}
  .o-head .time{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .o-head .fill{flex:1;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:2px;letter-spacing:1px;white-space:nowrap;}
  .badge.paid{background:#E9EFE2;color:var(--green);}
  .badge.cash{background:#FCF1DC;color:var(--gold);border:1px solid #E4C98A;}
  .badge.wait{background:#F3E1DC;color:#C8351F;}
  .badge.done{background:#E4EBF1;color:var(--blue);}
  .badge.cancel{background:#EEE;color:#888;}
  .order.cancelled{opacity:.55;}
  .badge.type-d{background:var(--wine);color:var(--cream);}
  .badge.type-p{background:#fff;color:var(--wine);border:1px solid var(--wine);}
  .badge.today{background:#C8351F;color:#fff;}
  .badge.pre{background:#fff;color:var(--ink-soft);border:1px solid var(--line);}
  .o-body{border-top:1px dashed var(--line);padding:12px 14px;display:none;}
  .order.open .o-body{display:block;}
  .o-sec{font-size:11.5px;color:var(--wine);font-weight:700;letter-spacing:2px;margin:10px 0 4px;}
  .o-sec:first-child{margin-top:0;}
  .o-line{font-size:13.5px;line-height:1.9;}
  .o-items{font-size:13.5px;line-height:1.9;border:1px solid var(--line);border-radius:4px;padding:8px 12px;background:var(--paper);}
  .o-items .r{display:flex;justify-content:space-between;}
  .o-items .tt{border-top:1px dashed var(--line);margin-top:4px;padding-top:4px;font-weight:800;color:var(--wine);}
  .track{display:flex;gap:8px;margin-top:8px;}
  .track input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:4px;font-size:14px;font-family:inherit;background:#fff;min-width:0;}
  .done-info{margin-top:8px;background:#E4EBF1;border-radius:4px;padding:9px 12px;font-size:13px;color:var(--blue);font-weight:700;}

  /* 菜單 */
  .m-wrap{padding:14px 16px 20px;}
  .cat-title{font-size:13.5px;color:var(--wine);font-weight:700;letter-spacing:4px;margin:16px 0 8px;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;display:flex;align-items:center;gap:10px;}
  .cat-title::after{content:"";flex:1;border-top:1px solid var(--line);}
  .mi{background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:9px;}
  .mi.off{opacity:.55;}
  .mi-h{display:flex;align-items:center;gap:8px;}
  .mi-h .nm{flex:1;font-size:14.5px;font-weight:700;}
  .switch{width:42px;height:24px;border-radius:12px;background:#D9CBAE;position:relative;cursor:pointer;border:none;flex-shrink:0;transition:background .15s;}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;}
  .switch.on{background:var(--green);}
  .switch.on::after{left:21px;}
  .sw-lb{font-size:11px;color:var(--ink-soft);letter-spacing:1px;}
  .vr{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .vr .vl{flex:1;font-size:13px;color:var(--ink-soft);}
  .vr input{width:82px;padding:7px 9px;border:1px solid var(--line);border-radius:4px;font-size:14px;font-family:inherit;text-align:right;background:#fff;}
  .vr input:focus{outline:none;border-color:var(--wine);}
  .vr .u{font-size:12px;color:var(--ink-soft);}
  .save-bar{padding:8px 16px 20px;position:sticky;bottom:0;background:var(--paper);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;
    padding:10px 22px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99;letter-spacing:1px;white-space:nowrap;}
  .toast.show{opacity:.92;}
</style>
</head>
<body>
<header>
  <div class="t">三代傳 · 店家後台</div>
  <button id="btn-refresh" style="display:none;">更新</button>
  <button id="btn-logout" style="display:none;">登出</button>
</header>

<!-- 登入 -->
<div id="login" style="display:none;">
  <h2>店家登入</h2>
  <form id="login-form">
    <div class="field"><label>Email</label><input type="email" id="li-email" required autocomplete="username"></div>
    <div class="field"><label>密碼</label><input type="password" id="li-pass" required autocomplete="current-password"></div>
    <button class="btn btn-full" type="submit" style="margin-top:10px;">登入</button>
    <div id="login-err"></div>
  </form>
</div>

<!-- 主畫面 -->
<div id="main" style="display:none;">
  <div class="mtabs">
    <button class="mtab on" id="mt-orders">訂單</button>
    <button class="mtab" id="mt-menu">菜單</button>
    <button class="mtab" id="mt-set">設定</button>
  </div>

  <div class="view show" id="v-orders">
    <div class="stats">
      <div class="stat"><div class="num" id="st-todo">0</div><div class="lb">待處理</div></div>
      <div class="stat"><div class="num" id="st-wait">0</div><div class="lb">待付款</div></div>
      <div class="stat"><div class="num" id="st-today">0</div><div class="lb">今日新單</div></div>
    </div>
    <div class="tabs">
      <button class="tab on" data-st="todo">待處理</button>
      <button class="tab" data-st="wait">待付款</button>
      <button class="tab" data-st="done">已完成</button>
      <button class="tab" data-st="cancelled">已取消</button>
      <button class="tab" data-st="all">全部</button>
    </div>
    <div class="tabs" style="padding-top:0;align-items:center;">
      <span style="font-size:12px;color:var(--ink-soft);letter-spacing:2px;flex:none;">類型：</span>
      <button class="tab tf" data-tf="pickup" style="flex:none;padding:8px 22px;">自取</button>
      <button class="tab tf" data-tf="delivery" style="flex:none;padding:8px 22px;">宅配</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;padding:12px 16px 0;">
      <button class="btn btn-w" style="flex:1;" onclick="printToday()">列印今日自取單</button>
      <span class="sw-lb">新單自動印</span>
      <button class="switch" id="sw-autoprint"></button>
    </div>
    <div id="new-alert" onclick="this.style.display='none'" style="display:none;margin:10px 16px 0;background:#C8351F;color:#fff;padding:11px 14px;border-radius:6px;font-size:13.5px;font-weight:700;line-height:1.6;cursor:pointer;">新訂單</div>
    <div class="list" id="list"><div class="empty">載入中…</div></div>
  </div>

  <div class="view" id="v-set">
    <div class="m-wrap">
      <div class="mi">
        <div class="mi-h"><span class="nm">開放到店自取</span><span class="sw-lb" id="lb-pickup"></span>
          <button class="switch" id="sw-pickup"></button></div>
      </div>
      <div class="mi">
        <div class="mi-h"><span class="nm">開放冷凍宅配</span><span class="sw-lb" id="lb-delivery"></span>
          <button class="switch" id="sw-delivery"></button></div>
        <div class="hint">宅配需要線上付款；「線上付款」未開放時，客人端的宅配會自動顯示「尚未開放」</div>
      </div>
      <div class="mi">
        <div class="mi-h"><span class="nm">開放線上付款（信用卡／LINE Pay）</span><span class="sw-lb" id="lb-onlinePay"></span>
          <button class="switch" id="sw-onlinePay"></button></div>
        <div class="hint">金流部署完成前請保持關閉；關閉時客人只能選「現金（取貨時付款）」</div>
      </div>
      <div class="mi">
        <div class="mi-h"><span class="nm">首頁公告</span><span class="sw-lb" id="lb-ann"></span>
          <button class="switch" id="sw-ann"></button></div>
        <textarea id="ann-input" rows="3" style="width:100%;margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:4px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff;" placeholder="例：本週六僅出攤鳳山工協"></textarea>
      </div>
      <button class="btn btn-full" id="btn-save-set" style="margin-top:6px;">儲存設定</button>
      <div class="hint" style="margin-top:8px;">儲存後客人端重新整理即生效</div>
    </div>
  </div>

  <div class="view" id="v-menu">
    <div class="m-wrap" id="menu-body"><div class="empty">載入中…</div></div>
    <div class="save-bar"><button class="btn btn-full" id="btn-save-menu">儲存菜單變更</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>
<script type="module">
const $ = id => document.getElementById(id);
const money = n => "NT$ " + (n||0).toLocaleString();
let toastTimer;
const toast = m => { const t=$("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800); };

const cfg = window.FIREBASE_CONFIG || {};
if(!cfg.apiKey){ document.body.innerHTML = "<p style='padding:40px;text-align:center;'>firebase-config.js 尚未設定</p>"; throw new Error("no config"); }

const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
const { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } =
  await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
const { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, serverTimestamp, getDoc, setDoc } =
  await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

const app = initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

/* ── 登入狀態 ── */
onAuthStateChanged(auth, user=>{
  $("login").style.display = user? "none":"block";
  $("main").style.display = user? "block":"none";
  $("btn-logout").style.display = user? "inline-block":"none";
  $("btn-refresh").style.display = user? "inline-block":"none";
  if(user) startData();
});
$("login-form").addEventListener("submit", async e=>{
  e.preventDefault();
  $("login-err").textContent = "";
  try{ await signInWithEmailAndPassword(auth, $("li-email").value.trim(), $("li-pass").value); }
  catch(err){ $("login-err").textContent = "登入失敗：帳號或密碼錯誤"; console.error(err); }
});
$("btn-logout").onclick = ()=>signOut(auth);
$("btn-refresh").onclick = ()=>{ refetch(); toast("已更新"); };

/* ── 分頁切換 ── */
$("mt-orders").onclick = ()=>setView("orders");
$("mt-menu").onclick = ()=>setView("menu");
$("mt-set").onclick = ()=>setView("set");
function setView(v){
  ["orders","menu","set"].forEach(x=>{
    $("v-"+x).classList.toggle("show", x===v);
    $("mt-"+x).classList.toggle("on", x===v);
  });
  window.scrollTo(0,0);
}

/* ── 店家設定 ── */
let SHOP = { pickupOpen:true, deliveryOpen:false, onlinePayOpen:false, annOn:false, annText:"" };
const SW_KEYS = ["pickup","delivery","onlinePay","ann"];
function swKeyToField(k){ return k==="ann"? "annOn" : k+"Open"; }
function renderSettings(){
  SW_KEYS.forEach(k=>{
    const on = !!SHOP[swKeyToField(k)];
    $("sw-"+k).classList.toggle("on", on);
    $("lb-"+k).textContent = on? "開放中":"已關閉";
  });
  $("lb-ann").textContent = SHOP.annOn? "顯示中":"已隱藏";
  $("ann-input").value = SHOP.annText || "";
}
SW_KEYS.forEach(k=>{
  $("sw-"+k).onclick = ()=>{ SHOP[swKeyToField(k)] = !SHOP[swKeyToField(k)]; renderSettings(); };
});
async function loadSettings(){
  try{
    const s = await getDoc(doc(db,"settings","shop"));
    if(s.exists()) SHOP = Object.assign(SHOP, s.data());
  }catch(e){ console.error(e); }
  renderSettings();
}
$("btn-save-set").onclick = async ()=>{
  SHOP.annText = $("ann-input").value.trim();
  try{
    await setDoc(doc(db,"settings","shop"), SHOP, {merge:true});
    toast("設定已儲存");
  }catch(e){ console.error(e); toast("儲存失敗"); }
};

/* ── 訂單 ── */
let ORDERS = [];
let stF = "todo", tyF = "all";
const ST_LABEL = {
  pending_payment: ["待付款","wait"],
  confirmed_cash: ["現金待收","cash"],
  paid: ["已付款","paid"],
  shipped: ["已出貨","done"],
  picked_up: ["已取貨","done"],
  cancelled: ["已取消","cancel"]
};
const isTodo = o => o.status==="paid" || o.status==="confirmed_cash";
const isDone = o => o.status==="shipped" || o.status==="picked_up";
const isCancelled = o => o.status==="cancelled";
const todayStr = ()=>{ const d=new Date(); return d.toISOString().slice(0,10); };
function fmtTime(ts){
  if(!ts || !ts.toDate) return "—";
  const d = ts.toDate();
  return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
let started = false, knownIds = null;
function beep(){
  try{
    const C = window.AudioContext || window.webkitAudioContext; if(!C) return;
    const ctx = new C();
    [0,0.22,0.44].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.value = 0.12;
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.16);
    });
  }catch(e){}
}
let autoPrint = false;
try{ autoPrint = localStorage.getItem("sdc_autoprint")==="1"; }catch(e){}
function syncAutoPrint(){ $("sw-autoprint").classList.toggle("on", autoPrint); }
$("sw-autoprint").onclick = ()=>{
  autoPrint = !autoPrint;
  try{ localStorage.setItem("sdc_autoprint", autoPrint? "1":"0"); }catch(e){}
  syncAutoPrint(); toast(autoPrint? "新單將自動列印":"已關閉自動列印");
};
syncAutoPrint();
function onOrders(list){
  ORDERS = list;
  const ids = new Set(ORDERS.map(o=>o.docId));
  if(knownIds){
    const fresh = ORDERS.filter(o=>!knownIds.has(o.docId));
    if(fresh.length){
      beep();
      const n = fresh[0];
      $("new-alert").innerHTML = `🔔 新訂單 ${fresh.length} 張：${n.orderNo||""} ${n.name||""}${n.type==="pickup"&&n.pickup? "（自取 "+n.pickup.market+" "+(n.pickup.slot||"")+"）":"（宅配）"}`;
      $("new-alert").style.display = "block";
      if(autoPrint) fresh.forEach((o,i)=> setTimeout(()=> sendToPrinter(buildTicket(o)), i*1500));
    }
  }
  knownIds = ids;
  renderOrders();
}
async function refetch(){
  try{
    const { getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const snap = await getDocs(query(collection(db,"orders"), orderBy("createdAt","desc")));
    onOrders(snap.docs.map(d=>({docId:d.id, ...d.data()})));
  }catch(e){ console.error(e); }
}
function startData(){
  if(started) return; started = true;
  onSnapshot(query(collection(db,"orders"), orderBy("createdAt","desc")), snap=>{
    onOrders(snap.docs.map(d=>({docId:d.id, ...d.data()})));
  }, err=>{ console.error(err); $("list").innerHTML = `<div class="empty">讀取訂單失敗<br>（請確認規則已更新且帳號在允許名單）</div>`; });
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refetch(); });
  setInterval(()=>{ if(!document.hidden) refetch(); }, 5000);
  loadMenu();
  loadSettings();
}
document.querySelectorAll(".tab[data-st]").forEach(b=>b.onclick=()=>{
  stF = b.dataset.st;
  document.querySelectorAll(".tab[data-st]").forEach(x=>x.classList.toggle("on", x===b));
  renderOrders();
});
document.querySelectorAll(".tab[data-tf]").forEach(b=>b.onclick=()=>{
  tyF = (tyF===b.dataset.tf)? "all" : b.dataset.tf;
  document.querySelectorAll(".tab[data-tf]").forEach(x=>x.classList.toggle("on", x.dataset.tf===tyF));
  renderOrders();
});
/* ══ 列印（Android + RawBT） ══ */
function padTo(s,n){ s=String(s); return s + " ".repeat(Math.max(0, n-s.length)); }
function buildTicket(o){
  const L = [];
  L.push("      三 代 傳");
  L.push("------------------------------");
  L.push("單號 " + (o.orderNo||""));
  L.push("下單 " + fmtTime(o.createdAt));
  L.push("");
  if(o.type==="pickup" && o.pickup){
    L.push("[ 自取 ] " + (o.pickup.market||""));
    L.push("  " + (o.pickup.date||"") + "  " + (o.pickup.slot||""));
  } else {
    L.push("[ 冷凍宅配 ]");
    if(o.store) L.push("  7-11 " + (o.store.city||"") + " " + (o.store.name||""));
  }
  L.push("------------------------------");
  (o.items||[]).forEach(x=>{
    L.push(padTo(x.name, 18) + padTo("x"+x.qty, 5) + (x.price*x.qty));
  });
  L.push("------------------------------");
  if(o.shipFee) L.push(padTo("運費",23) + o.shipFee);
  L.push(padTo("合計",23) + (o.total||0));
  L.push(o.payMethod==="cash" ? "** 現金應收 " + (o.total||0) + " 元 **" : "( 線上已付款 )");
  L.push("------------------------------");
  L.push("滷汁 " + (o.sauce||"-"));
  L.push("訂購 " + (o.name||"") + " " + (o.phone||""));
  if(o.note) L.push("備註 " + o.note);
  L.push(""); L.push(""); L.push("");
  return L.join("\n");
}
function sendToPrinter(text){
  try{
    const a = document.createElement("a");
    a.href = "rawbt:" + encodeURIComponent(text);
    document.body.appendChild(a); a.click(); a.remove();
    return true;
  }catch(e){ console.error(e); return false; }
}
window.printOrder = id=>{
  const o = ORDERS.find(x=>x.docId===id); if(!o) return;
  sendToPrinter(buildTicket(o)); toast("已送出列印");
};
window.printToday = ()=>{
  const t = todayStr();
  const list = ORDERS.filter(o=>o.type==="pickup" && !isCancelled(o) && !isDone(o) && o.pickup && o.pickup.date===t)
    .sort((a,b)=> String(a.pickup.slot||"").localeCompare(String(b.pickup.slot||"")));
  if(!list.length){ toast("今天沒有待處理的自取單"); return; }
  list.forEach((o,i)=> setTimeout(()=> sendToPrinter(buildTicket(o)), i*1500));
  toast("送出 " + list.length + " 張列印");
};
window.cancelOrder = async id=>{
  const o = ORDERS.find(x=>x.docId===id) || {};
  if(!confirm("確定取消訂單 " + (o.orderNo||"") + " ？取消後會移到「已取消」，不可復原。")) return;
  try{
    await updateDoc(doc(db,"orders",id), {status:"cancelled", cancelledAt:serverTimestamp()});
    toast("訂單已取消");
  }catch(e){ console.error(e); toast("取消失敗"); }
};
window.toggleO = id => $("o-"+id).classList.toggle("open");
window.shipOrder = async id=>{
  const inp = $("trk-"+id), v = inp.value.trim();
  if(!v){ inp.focus(); inp.style.borderColor="#C8351F"; return; }
  try{
    await updateDoc(doc(db,"orders",id), {status:"shipped", track:v, shippedAt:serverTimestamp()});
    toast("已標記出貨");
  }catch(e){ console.error(e); toast("儲存失敗"); }
};
window.pickupDone = async id=>{
  const o = ORDERS.find(x=>x.docId===id) || {};
  try{
    await updateDoc(doc(db,"orders",id), {status:"picked_up", pickedAt:serverTimestamp()});
    toast(o.payMethod==="cash"? "已取貨・現金收訖":"已標記取貨完成");
  }catch(e){ console.error(e); toast("儲存失敗"); }
};
function renderOrders(){
  $("st-todo").textContent = ORDERS.filter(isTodo).length;
  $("st-wait").textContent = ORDERS.filter(o=>o.status==="pending_payment").length;
  const tISO = todayStr();
  $("st-today").textContent = ORDERS.filter(o=>o.createdAt && o.createdAt.toDate && o.createdAt.toDate().toISOString().slice(0,10)===tISO).length;

  const show = ORDERS.map(o=>({o})).filter(({o})=>{
    const stOK = stF==="all" || (stF==="todo"&&isTodo(o)) || (stF==="wait"&&o.status==="pending_payment")
      || (stF==="done"&&isDone(o)) || (stF==="cancelled"&&isCancelled(o));
    const tyOK = tyF==="all" || o.type===tyF;
    return stOK && tyOK;
  });
  if(!show.length){ $("list").innerHTML = `<div class="empty">此分類目前沒有訂單。</div>`; return; }
  $("list").innerHTML = show.map(({o})=>{
    const id = o.docId;
    const st = ST_LABEL[o.status] || [o.status,"wait"];
    const isPk = o.type==="pickup";
    const pkToday = isPk && o.pickup && o.pickup.date===todayStr();
    return `<div class="order ${isCancelled(o)?"cancelled":""}" id="o-${id}">
      <div class="o-head" onclick="toggleO('${id}')">
        <div>
          <div class="no">${o.orderNo||"—"}</div>
          <div class="time">${fmtTime(o.createdAt)} · ${o.name||""}${isPk&&o.pickup? `<br><b style="color:var(--wine);">取貨：${o.pickup.market} ${(o.pickup.date||"").slice(5).replace("-","/")} ${o.pickup.slot||""}</b>`:""}</div>
        </div>
        <div class="fill"></div>
        <span class="badge ${isPk?"type-p":"type-d"}">${isPk?"自取":"宅配"}</span>
        ${isPk? `<span class="badge ${pkToday?"today":"pre"}">${pkToday?"今日單":"預購單"}</span>`:""}
        <span class="badge ${st[1]}">${st[0]}</span>
      </div>
      <div class="o-body">
        <div class="o-sec">訂購明細</div>
        <div class="o-items">
          ${(o.items||[]).map(x=>`<div class="r"><span>${x.name} × ${x.qty}</span><span>${money(x.price*x.qty)}</span></div>`).join("")}
          <div class="r"><span>運費</span><span>${isPk?"自取免運":(o.shipFee? money(o.shipFee):"免運")}</span></div>
          <div class="r tt"><span>合計${o.payMethod==="cash"?"（現金應收）":""}</span><span>${money(o.total)}</span></div>
        </div>
        <div class="o-sec">滷汁</div><div class="o-line">${o.sauce||"—"}</div>
        <div class="o-sec">${isPk?"取貨資訊":"收件資訊"}</div>
        <div class="o-line"><b>${o.name||""}</b>　${o.phone||""}<br>${isPk? (o.pickup? o.pickup.market+"市場 · "+(o.pickup.date||"")+" "+(o.pickup.slot||"") : "—") : (o.store? "7-11 "+o.store.city+"・"+o.store.name : "—")}</div>
        ${o.note? `<div class="o-sec">備註</div><div class="o-line">${o.note}</div>`:""}
        <div class="o-sec">目前狀態</div><div class="o-line">${st[0]}</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn" style="flex:1;background:#fff;border:1px solid var(--wine);color:var(--wine);padding:9px 0;" onclick="printOrder('${id}')">列印此單</button>
          ${(isCancelled(o)||isDone(o))? "" : `<button class="btn" style="flex:1;background:#fff;border:1px solid #C8351F;color:#C8351F;padding:9px 0;" onclick="cancelOrder('${id}')">取消訂單</button>`}
        </div>
        <div class="o-sec">處理</div>
        ${o.status==="pending_payment"
          ? `<div class="o-line" style="color:var(--ink-soft);">等待客人完成線上付款（金流開通後自動更新）</div>`
          : isDone(o)
            ? `<div class="done-info">${o.status==="shipped"? "已出貨 · 宅配單號 "+(o.track||"") : "已取貨完成"+(o.payMethod==="cash"?" · 現金收訖":"")}</div>`
            : (o.type==="delivery"
              ? `<div class="track"><input id="trk-${id}" placeholder="輸入 7-11 冷凍交貨便單號"><button class="btn btn-w" onclick="shipOrder('${id}')">標記出貨</button></div>
                 <div class="hint">到 7-11 系統建立冷凍寄件後，把單號填回這裡</div>`
              : `<button class="btn btn-w" onclick="pickupDone('${id}')">${o.payMethod==="cash"? "標記已取貨・現金收訖 "+money(o.total):"標記已取貨"}</button>`)}
      </div>
    </div>`;
  }).join("");
}

/* ── 菜單管理 ── */
let PRODUCTS = [];
const dirty = new Set();
function loadMenu(){
  onSnapshot(query(collection(db,"products"), orderBy("catSort")), snap=>{
    PRODUCTS = snap.docs.map(d=>({docId:d.id, ...d.data()}));
    PRODUCTS.sort((a,b)=> (a.catSort-b.catSort) || ((a.sort??0)-(b.sort??0)));
    renderMenu();
  }, err=>{ console.error(err); $("menu-body").innerHTML=`<div class="empty">讀取菜單失敗</div>`; });
}
window.toggleItem = async idx=>{
  const p = PRODUCTS[idx];
  try{ await updateDoc(doc(db,"products",p.docId), {on: !(p.on!==false)}); toast(p.on!==false? p.n+" 已設為售完":p.n+" 已上架"); }
  catch(e){ console.error(e); toast("儲存失敗"); }
};
window.markDirty = idx => dirty.add(idx);
function renderMenu(){
  let html = `<div class="hint" style="margin-top:2px;">價格與自取限量改完按底部「儲存菜單變更」；售完開關點了立即生效。自取限量：同一取貨日的自取訂單加總不得超過限量；宅配不限量。</div>`;
  let lastCat = null;
  PRODUCTS.forEach((p,idx)=>{
    if(p.cat!==lastCat){ html += `<div class="cat-title">${p.cat}</div>`; lastCat = p.cat; }
    const on = p.on!==false;
    html += `<div class="mi ${on?"":"off"}">
      <div class="mi-h">
        <span class="nm">${p.n}</span>
        <span class="sw-lb">${on?"販售中":"售完/下架"}</span>
        <button class="switch ${on?"on":""}" onclick="toggleItem(${idx})"></button>
      </div>
      <div class="vr" style="background:var(--cream-soft);border-radius:4px;padding:6px 8px;margin-top:8px;">
        <span class="vl" style="font-weight:700;color:var(--ink);">自取每日限量</span>
        <input type="number" min="0" placeholder="不限" value="${p.limit??""}" id="lim-${idx}" oninput="markDirty(${idx})">
        <span class="u">份</span>
      </div>
      ${(p.vars||[]).map((v,vi)=>`
        <div class="vr">
          <span class="vl">${v.v||"單份"}</span>
          <input type="number" min="0" value="${v.p}" id="pr-${idx}-${vi}" oninput="markDirty(${idx})">
          <span class="u">元</span>
        </div>`).join("")}
    </div>`;
  });
  $("menu-body").innerHTML = html;
}
$("btn-save-menu").onclick = async ()=>{
  if(!dirty.size){ toast("沒有變更"); return; }
  let ok = 0;
  for(const idx of dirty){
    const p = PRODUCTS[idx];
    const limRaw = $("lim-"+idx).value;
    const newVars = (p.vars||[]).map((v,vi)=>({v:v.v, p:+($("pr-"+idx+"-"+vi).value||0)}));
    try{
      await updateDoc(doc(db,"products",p.docId), {vars:newVars, limit: limRaw===""? null:+limRaw});
      ok++;
    }catch(e){ console.error(e); }
  }
  dirty.clear();
  toast(`已儲存 ${ok} 個品項`);
};
</script>
